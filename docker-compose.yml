services:
  skye-bot:
    build: .
    container_name: skye-bot
    restart: unless-stopped
    # Configuration lives in config.yaml. Real environment variables override
    # YAML values (useful for platform-injected secrets like VERCEL_OIDC_TOKEN).
    env_file:
      - path: .env
        required: false
    volumes:
      # Mount the YAML config (gitignored — contains secrets).
      - ./config.yaml:/app/config.yaml:ro
      # Persist the SQLite DB (src/core/db.ts defaults to /app/data/skye.db) across rebuilds.
      - ./data:/app/data
    ports:
      # Expose the Telegram Mini App / settings panel served by the bot.
      - "${PANEL_WEBAPP_PORT:-3001}:${PANEL_WEBAPP_PORT:-3001}"
