name: Deploy

on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  check:
    name: Lint, Test, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm test

      - run: pnpm build

      - run: pnpm --filter skye-panel build

  deploy:
    name: Deploy to Vilnius
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host vilnius
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
          EOF

      - name: Deploy
        env:
          BRANCH: ${{ github.ref_name }}
          PRODUCTION_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh vilnius "BRANCH='$BRANCH' PRODUCTION_PATH='$PRODUCTION_PATH' bash -s" << 'EOF'
            set -euo pipefail

            if [ "$BRANCH" = "main" ]; then
              deploy_path="$PRODUCTION_PATH"
              app_name="skye-bot"
            else
              deploy_path="${PRODUCTION_PATH}-dev"
              app_name="skye-bot-dev"
            fi

            if [ ! -d "$deploy_path/.git" ]; then
              git clone --branch "$BRANCH" https://github.com/ehlvg/skye-bot.git "$deploy_path"
            fi

            cd "$deploy_path"
            git switch "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            SKYE_PM2_NAME="$app_name" bash scripts/deploy-pm2.sh
          EOF
