bot_token: "123456789:ABCdefGhIJKlmnoPQRstuVWxyz_example"
# Prevent two local long-polling bot processes from using the same BOT_TOKEN.
# Set to "0" only if your deployment uses another single-instance mechanism.
telegram_polling_lock: "1"

# Bot owner / author — surfaced in the system prompt so Skye knows who created
# her and weights their messages above other participants. Set both to empty
# strings to omit the owner section entirely.
owner:
  name: "Melissa"
  tag: "miss_sterling"

# Bot administrators — Telegram user ids allowed to run /allow, /disallow,
# /ban, /unban, /allowed and to use Skye with unlimited, free access.
admin_ids: ""
# Legacy manual allow-list. On the first run after upgrade these ids are
# seeded into the admin allowlist table; after that, manage access with
# the /allow command in chat.
allowed_ids: ""

openai_key: "sk-or-XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
max_completion_tokens: 500
base_url: "https://openrouter.ai/api/v1"

# Perplexity Agent API — required only if any model in the catalog above
# has provider: "perplexity". Get a key at https://console.perplexity.ai
# Skye uses the Responses API (OpenAI-compatible) to talk to Perplexity,
# enabling server-side web search and sandbox tools without MCP.
perplexity_api_key: ""
perplexity_base_url: "https://api.perplexity.ai/v1"

# The masked model catalog exposed to users. Each entry has a display name
# (shown in the Mini App and /models), a real provider model id used for
# the upstream call, and a token-cost multiplier. The underlying model id
# is never shown to the user — only the masked name.
# `default_model_id` is the tier new subscribers start on.
#
# Optional fields per model:
#   provider:    "openrouter" (default) or "perplexity".
#                When "perplexity", the request is routed to the Perplexity
#                Agent API (requires perplexity_api_key below). Perplexity
#                models use the Responses API exclusively and can enable
#                server-side tools (web_search, sandbox) that run on
#                Perplexity's infrastructure — no MCP or client-side sandbox
#                needed for those capabilities.
#   builtin_tools: list of Perplexity built-in tools to enable.
#                "web_search"  — let the model search the web and cite sources.
#                "fetch_url"   — let the model fetch a specific URL's content.
#                "sandbox"     — let the model run code in an isolated container.
#   preset:      Perplexity preset name (e.g. "pro-search") for optimized
#                search behavior. See Perplexity docs for available presets.
default_model_id: "sydney"
models:
  - id: sydney
    name: Sydney
    model: google/gemini-3.1-flash-lite
    multiplier: 1.0
  - id: tokyo
    name: Tokyo
    model: openai/gpt-oss-20b
    multiplier: 1.5
  - id: berlin
    name: Berlin
    model: anthropic/claude-3.7-sonnet
    multiplier: 2.5
  - id: toronto
    name: Toronto
    model: openai/gpt-5.5
    multiplier: 4.0
  # Example: a Perplexity-powered tier with built-in web search + sandbox.
  # Requires perplexity_api_key below.
  # - id: perplexity-pro
  #   name: Pro Search
  #   model: openai/gpt-5.5
  #   multiplier: 5.0
  #   provider: perplexity
  #   builtin_tools:
  #     - web_search
  #     - sandbox
  #   preset: pro-search

# Force Chat Completions API instead of Responses API.
# Set to "true" if your provider doesn't support the Responses API
# (Ollama, vLLM, most self-hosted inference servers). Defaults to "false".
# use_chat_completions: false

# --- Skye Plus subscription (Telegram Stars) ---
# Public users unlock Skye with a 1899 ⭐ / 30-day subscription. The base
# monthly token quota is topped up each renewal; users can buy extra token
# packs (only while subscribed) which expire when the subscription lapses.
billing:
  currency: "XTR"
  title: "Skye Plus"
  description: "Monthly subscription — unlocks Skye and adds 2,000,000 tokens per month."
  subscription_stars: 1899
  subscription_period_seconds: 2592000   # 30 days — Bot API 8.0 requires this value
  base_quota_tokens: 2000000
  packs:
    - id: pack_500
      name: Quick Boost
      stars: 499
      tokens: 500000
    - id: pack_1500
      name: Big Boost
      stars: 999
      tokens: 1500000
    - id: pack_5000
      name: Mega Boost
      stars: 2499
      tokens: 5000000

# Image generation provider (used by /image and image editing).
# Independent from chat — fill these in if your chat provider doesn't support
# OpenRouter's chat-completions image modality (e.g. when base_url points to
# Ollama). If left empty, falls back to base_url/openai_key above.
# Recommended: OpenRouter with the Gemini image model.
image:
  base_url: ""
  api_key: ""
  model: "google/gemini-3.1-flash-image-preview"

# PDF parsing — when a user sends a PDF or replies to one, Skye passes it
# to the LLM as a file input. OpenRouter-compatible providers can parse the
# PDF server-side via a "file-parser" plugin engine.
# Engines: "mistral-ocr" (best for scanned docs/images, paid per page),
#          "cloudflare-ai" (free, markdown output),
#          "native" (model must support file input natively),
#          "" (auto — uses the model's native support or defaults)
# Set to "" to disable PDF parsing entirely.
pdf_engine: ""
# Maximum PDF file size to accept (bytes, default 25 MB)
pdf_max_bytes: 26214400

# Voice (speech) provider — choose between Yandex SpeechKit and OpenRouter.
# Both support STT (speech-to-text) and TTS (text-to-speech).
voice:
  # "yandex" (default) or "openrouter"
  provider: "yandex"

  # Yandex Cloud SpeechKit — single Api-Key drives both STT and TTS.
  # Get one at https://aistudio.yandex.ru (Service Account → Api-Key).
  yc_api_key: ""
  yc_folder_id: ""
  # TTS voice settings (Yandex SpeechKit). Optional — sensible defaults below.
  # Voice catalogue: https://aistudio.yandex.ru/docs/ru/speechkit/tts/voices.html
  # Russian options include: jane, omazh, alena, oksana, zahar, ermil, filipp
  tts_voice: "jane"
  # Emotion: neutral | good | evil | strict | friendly (voice-dependent)
  tts_emotion: "neutral"
  # BCP-47 language tag — ru-RU | en-US | tr-TR | kk-KK | uz-UZ ..
  tts_lang: "ru-RU"
  # Playback speed: 0.1 – 3.0 (1.0 is normal)
  tts_speed: 1.0

  # OpenRouter speech (used when provider: "openrouter").
  # By default reuses openai_key/base_url above — fill in below to override.
  # STT docs: https://openrouter.ai/docs/guides/overview/multimodal/stt
  # TTS docs: https://openrouter.ai/docs/guides/overview/multimodal/tts
  openrouter:
    api_key: ""
    base_url: "https://openrouter.ai/api/v1"
    # STT model — e.g. nvidia/parakeet-tdt-0.6b-v3, openai/whisper-1
    stt_model: "nvidia/parakeet-tdt-0.6b-v3"
    # TTS model — e.g. google/gemini-3.1-flash-tts-preview, openai/gpt-4o-mini-tts
    tts_model: "google/gemini-3.1-flash-tts-preview"
    # Voice id (model-specific). Gemini TTS voices: Puck, Charon, Sulafat,
    # Aoede, Leda, Orus, Kore, Fenrir. OpenAI TTS voices: alloy, echo, nova...
    tts_voice: "Aoede"
    # TTS response format: mp3 | pcm. Gemini TTS only supports "pcm".
    tts_format: "pcm"
    tts_format: "mp3"
    # Input format to normalize audio into before STT: mp3 | wav | oggopus
    stt_format: "mp3"
    # ISO-639-1 language hint for STT; "" = auto-detect (e.g. "ru", "en")
    stt_language: ""
    # Optional OpenRouter ranking headers
    referer: ""
    title: ""

# Logging (pino)
# Levels: trace | debug | info | warn | error | fatal
log_level: "info"

# Audit log retention — two independent guards, whichever is stricter applies first
audit:
  # Keep rows for this many days (default: 90)
  retention_days: 90
  # Keep at most this many rows total (default: 100 000 ≈ ~20 MB)
  max_rows: 100000

# MCP (Model Context Protocol) — path to mcp.json config file
# Defaults to ./mcp.json in the project root
# mcp:
#   config_path: "./mcp.json"
#
# For HTTP MCP servers, set inputs as environment variables.
# For example, if mcp.json contains "Authorization": "Bearer ${input:github_mcp_pat}",
# add the PAT here using the input id as the variable name:
# github_mcp_pat: "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Settings Panel (Telegram Mini App)
panel:
  # Public URL where the Mini App is accessible (set in BotFather too)
  webapp_url: "http://localhost:3001"
  # Port for the panel web server
  webapp_port: 3001

# Database path. Supports ":memory:" for ephemeral storage.
# db_path: "data/skye.db"

# Vercel Sandbox — isolated per-chat compute with internet access.
# Get a token at https://vercel.com/account/tokens and your project/team IDs
# from the Vercel dashboard. If the bot runs on Vercel you can omit these and
# rely on VERCEL_OIDC_TOKEN instead (set by the Vercel runtime as an env var).
sandbox:
  enabled: true
  runtime: "node24"
  timeout_ms: 300000
  vcpus: 2
  persistent: false
  command_timeout_ms: 60000
  vercel_access_token: ""
  vercel_project_id: ""
  vercel_team_id: ""